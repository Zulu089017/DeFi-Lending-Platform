name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Soroban contracts ───
  stellar-contracts:
    name: Soroban contracts
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./stellar-contracts } }
    steps:
      - uses: actions/checkout@v4
      # NOTE: `cargo test --workspace` is currently broken due to a
      # `soroban-sdk 21.x` dep-tree split (two incompatible
      # `ed25519-dalek` majors + `elliptic-curve`, all needing different
      # `rand_core` ranges). See `stellar-contracts/BUILD_ENV_NOTES.md`
      # for the two real fixes. The `@stable` pin is left as-is so CI
      # surfaces the dep-tree failure loudly rather than masking it.
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown, components: rustfmt, clippy }
      - run: cargo fmt --all -- --check
      - run: cargo build --target wasm32-unknown-unknown --release
      - run: cargo test --workspace
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─── EVM contracts ───
  evm-contracts:
    name: EVM contracts
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./evm-contracts } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx hardhat compile
      - run: npx hardhat test
      - name: Slither static analysis
        uses: crytic/slither-action@v0.4.0
        with:
          contract_dir: evm-contracts/contracts
          solc_version: 0.8.24
          slither_args: --filter-paths "node_modules|openzeppelin" --fail-low

  # ─── TypeScript services ───
  ts-services:
    name: TS services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: { service: [bridge, relayer, indexer, api, sdk] }
    defaults: { run: { working-directory: ${{ matrix.service }} } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci || pnpm install
      - run: npx prisma generate || true
      - run: npx tsc --noEmit
      - run: npm test || true
      - name: Audit
        run: npm audit --audit-level=high || true

  # ─── Frontend ───
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci || pnpm install
      - run: npx tsc --noEmit
      - run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_STELLAR_CONTROLLER: "CABC"
