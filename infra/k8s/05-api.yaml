apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: openlend }
spec:
  replicas: 2
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: openlend/api:latest
          env:
            - name: DATABASE_URL
              value: postgresql://openlend:changeme@postgres:5432/openlend
            - name: STELLAR_RPC
              value: https://horizon.stellar.org
            - name: STELLAR_NETWORK_PASSPHRASE
              value: "Public Global Stellar Network ; September 2015"
            - name: STELLAR_CONTROLLER
              value: "C..."
            - name: CORS_ORIGINS
              value: "*"
          ports: [{ containerPort: 4000 }]
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi"  }
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: openlend }
spec:
  selector: { app: api }
  ports: [{ port: 80, targetPort: 4000 }]
