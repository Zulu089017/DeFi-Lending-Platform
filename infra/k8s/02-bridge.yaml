apiVersion: v1
kind: Secret
metadata: { name: bridge-env, namespace: openlend }
type: Opaque
stringData:
  DATABASE_URL: postgresql://openlend:changeme@postgres:5432/bridge
  ETHEREUM_RPC: https://eth.llamarpc.com
  POLYGON_RPC: https://polygon-rpc.com
  SOLANA_RPC: https://api.mainnet-beta.solana.com
  ETHEREUM_BRIDGE: "0x0000000000000000000000000000000000000000"
  POLYGON_BRIDGE: "0x0000000000000000000000000000000000000000"
  STELLAR_RPC: https://horizon.stellar.org
  STELLAR_NETWORK_PASSPHRASE: "Public Global Stellar Network ; September 2015"
  STELLAR_CONTROLLER: "C..."
  RELAYER_SECRET: "S..."
  ATTESTER_KEYS: "0x..,0x..,0x.."
  ATTESTER_THRESHOLD: "2"
  LOG_LEVEL: info
  POLL_INTERVAL_MS: "4000"
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: bridge, namespace: openlend }
spec:
  replicas: 1
  selector: { matchLabels: { app: bridge } }
  template:
    metadata: { labels: { app: bridge } }
    spec:
      containers:
        - name: bridge
          image: openlend/bridge:latest
          envFrom: [{ secretRef: { name: bridge-env } }]
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi"  }
